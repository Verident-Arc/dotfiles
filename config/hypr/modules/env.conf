#  ◈ ENVIRONMENT VARIABLES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

env = NIXOS_OZONE_WL,1
env = WALLPAPER_DIR,/home/_null/.cache/wallpaper_picker/thumbs
env = SCRIPT_DIR,/home/_null/.config/hypr/scripts

# Screen Sharing
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# AMD Specific Performance
env = LIBVA_DRIVER_NAME,radeonsi
env = VDPAU_DRIVER,radeonsi
env = AMD_VULKAN_ICD,RADV

# Fix for some AMD related flickering/sluggishness
env = mesa_glthread,true
env = __GL_THREADED_OPTIMIZATIONS,1

# For Gaming (Roblox/Sober)
env = RADV_PERFTEST,gpl
env = vblank_mode,0
