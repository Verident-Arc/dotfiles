# Screen Sharing
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user stop xdg-desktop-portal xdg-desktop-portal-hyprland xdg-desktop-portal-gtk
exec-once = systemctl --user start xdg-desktop-portal xdg-desktop-portal-hyprland xdg-desktop-portal-gtk

# Wallpaper & Theme Init
exec-once = awww-daemon
exec-once = sleep 1 && file=$(find "$WALLPAPER_DIR" -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) | shuf -n 1); [[ -n "$file" ]] && { cp "$file" /tmp/lock_bg.png; awww img "$file" --transition-type any --transition-pos 0.5,0.5 --transition-fps 144 --transition-duration 1; matugen image "$file" --mode dark --source-color-index 0; bash ~/.config/hypr/scripts/quickshell/wallpaper/matugen_reload.sh; }

# Services
exec-once = sudo systemctl restart systemd-timesyncd # Force time sync on start
exec-once = swayosd-server --top-margin 0.9 --style ~/.config/swayosd/style.css
exec-once = hypridle
exec-once = playerctld
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user enable --now easyeffects
exec-once = ~/.config/hypr/scripts/volume_listener.sh

# Quickshell
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Main.qml
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/TopBar.qml
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py &
