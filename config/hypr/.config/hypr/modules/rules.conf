#  ◈ WINDOW & LAYER RULES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ───────── Layer Rules ─────────
layerrule {
    name = "volume_osd"
    match:namespace = ^(volume_osd)$
    no_anim = on
}

layerrule {
    name = "brightness_osd"
    match:namespace = ^(brightness_osd)$
    no_anim = on
}

layerrule {
    name = "hyprpicker"
    match:namespace = hyprpicker
    no_anim = on
}

layerrule {
    name = "qsdock"
    match:namespace = qsdock
    no_anim = on
}

layerrule {
    name = "session_lock"
    match:namespace = ext-session-lock
    blur = on
    ignore_alpha = 0.2
}

layerrule {
    name = "rofi"
    match:namespace = ^(rofi)$
    blur = on
    ignore_alpha = 0.5
}

# ───────── Floating Windows ─────────
windowrule {
    name = "wallpaper_picker"
    match:title = ^(Select Wallpaper)$
    float = on
    center = on
    border_size = 0
    no_shadow = on
}

windowrule {
    name = "theme_switcher"
    match:title = ^(Select Theme)$
    float = on
    center = on
    border_size = 0
    no_shadow = on
}

windowrule {
    name = "app_launcher"
    match:title = ^(app-launcher)$
    float = on
    center = on
    border_size = 0
    no_shadow = on
    size = 700 450
}

# ───────── Gaming & Performance ─────────
windowrule {
    name = "sober_tearing"
    match:class = ^(org.vinegarhq.Sober|sober)$
    immediate = on
}

windowrule {
    name = "steam_tearing"
    match:class = ^(steam_app_.*)$
    immediate = on
}

# ───────── Special Workspaces ─────────
windowrule {
    name = "discord_special"
    match:class = ^(discord|vesktop)$
    workspace = special:1
}

windowrule {
    name = "spotify_special"
    match:class = ^(spotify|Spotify|spotify-launcher)$
    workspace = special:2
}

# ───────── MASTER QUICKSHELL CONTAINER ─────────
windowrule {
    name = "master_rule"
    match:title = ^(qs-master)$
    float = on
    pin = on
    no_shadow = on
    no_initial_focus = on
    move = -5000 -5000
    size = 1 1
}
