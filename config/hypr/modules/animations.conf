#  ◈ ANIMATIONS (Optimized for Snappiness)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = fluent_decel, 0, 1, 0, 1

    # Windows pop in instead of sliding
    animation = windows, 1, 3, fluent_decel, popin 80%
    animation = windowsOut, 1, 3, fluent_decel, popin 80%
    # Layers (rofi, waybar) set to fade to remove the up/down slide
    animation = layers, 1, 3, fluent_decel, fade
    animation = layersIn, 1, 3, fluent_decel, fade
    animation = layersOut, 1, 3, fluent_decel, fade
    animation = fade, 1, 3, fluent_decel
    # Workspaces slide horizontally (standard)
    animation = workspaces, 1, 3, fluent_decel, slide
    # Special workspaces fade to avoid the vertical slide
    animation = specialWorkspaceIn, 1, 3, fluent_decel, fade
    animation = specialWorkspaceOut, 1, 3, fluent_decel, fade
}
